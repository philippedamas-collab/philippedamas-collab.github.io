<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Philippe Damas — Senior IT Program Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=DM+Sans:wght@400;500;700&family=Nunito:wght@800&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#f5f0e8;color:#1a1a1a;font-family:'Inter',Arial,sans-serif;font-size:15px;font-weight:300;line-height:1.6}
a{text-decoration:none;color:inherit}
.engie-text{font-family:'Nunito',sans-serif;font-weight:800}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;padding:0 40px;display:flex;justify-content:space-between;align-items:center;background:rgba(245,240,232,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,.06)}
.logo{font-family:'DM Sans',Arial,sans-serif;font-weight:700;font-size:1rem;letter-spacing:.06em;text-transform:uppercase}
.logo span{color:#7c3aed}
.nav-c{display:flex;align-items:center;gap:16px}
.nav-links{display:flex;gap:16px}
.nav-links a{font-size:.65rem;color:#666;letter-spacing:.03em;text-transform:uppercase;cursor:pointer;transition:color .2s}
.nav-links a:hover{color:#1a1a1a}
.nav-sep{width:1px;height:16px;background:rgba(0,0,0,.12);margin:0 4px}
.nav-ext{color:#7c3aed!important;font-weight:600;font-size:.65rem!important}
.nav-ext:hover{color:#5b21b6!important}
.lang-sw{display:flex;gap:2px}
.lang-sw button{font-size:.65rem;padding:4px 9px;background:transparent;color:#999;border:1px solid #ddd;cursor:pointer;border-radius:4px}
.lang-sw button.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.talk-btn{padding:9px 20px;background:#7c3aed;color:#fff;border-radius:30px;font-size:.72rem;font-weight:600;border:none;cursor:pointer;display:flex;align-items:center;gap:6px}
.talk-btn::after{content:'→'}
.page{max-width:1200px;margin:0 auto;padding:80px 40px 60px}
.hero-section{min-height:70vh;display:grid;grid-template-columns:1fr 1fr;gap:0;align-items:center;padding:20px 0 40px;border-bottom:1px solid rgba(0,0,0,.08);margin-bottom:40px}
.hero-left{padding-right:40px}
.hero-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:#7c3aed;margin-bottom:24px}
.hero-tag-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:blink 2s infinite}
.hero-name{font-family:'DM Sans',Arial,sans-serif;font-weight:700;font-size:clamp(2.2rem,4vw,3.5rem);line-height:1;letter-spacing:-.02em;margin-bottom:0}
.hero-name-orange{font-family:'DM Sans',Arial,sans-serif;font-weight:700;font-size:clamp(2.2rem,4vw,3.5rem);line-height:1;letter-spacing:-.02em;color:#7c3aed;margin-bottom:6px}
.hero-sub-title{font-family:'DM Sans',Arial,sans-serif;font-weight:600;font-size:clamp(1.3rem,2.2vw,1.8rem);color:#bbb;line-height:1.3;font-style:normal;margin-bottom:18px}
.hero-sub{font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;color:#333;font-weight:700;margin-bottom:12px}
.hero-desc{font-size:.9rem;color:#555;line-height:1.8;max-width:420px;margin-bottom:28px}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap}
.hbp{padding:11px 24px;background:#1a1a1a;color:#fff;border-radius:30px;font-size:.72rem;font-weight:600;border:none;cursor:pointer}
.hbs{padding:11px 24px;background:transparent;color:#1a1a1a;border-radius:30px;font-size:.72rem;font-weight:600;border:1.5px solid #ccc;cursor:pointer}
.hbs:hover{border-color:#1a1a1a}
.hero-right{position:relative}
.hero-img-wrap{border-radius:24px;overflow:hidden;height:480px;background:#ddd}
.hero-img-wrap img{width:100%;height:100%;object-fit:cover;object-position:center 12%;display:block}
.sayhi{padding:20px 0;border-bottom:1px solid rgba(0,0,0,.06);margin-bottom:36px}
.sayhi-text{font-size:1.05rem;color:#444;line-height:1.8;max-width:700px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#e0dbd0;border-radius:16px;overflow:hidden;margin-bottom:60px}
.sc{background:#f5f0e8;padding:24px 20px;text-align:center}
.sc:hover{background:#fff}
.sn{font-family:'DM Sans',Arial,sans-serif;font-weight:700;font-size:2.2rem;color:#7c3aed}
.sl{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:#999;margin-top:4px}
.section{margin-bottom:60px}
.section-header{display:flex;align-items:baseline;gap:16px;margin-bottom:28px;padding-bottom:14px;border-bottom:1px solid rgba(0,0,0,.08)}
.sh-num{font-family:'DM Sans',Arial,sans-serif;font-weight:700;font-size:3rem;color:#e0dbd0;line-height:1;margin-right:4px}
.sh-title{font-family:'DM Sans',Arial,sans-serif;font-weight:700;font-size:1.6rem;letter-spacing:-.01em}
.sh-sub{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:#999;margin-left:auto}
.accomp-card{background:#1a1a1a;color:#fff;border-radius:24px;padding:36px;position:relative;overflow:hidden}
.accomp-card::before{content:'';position:absolute;top:-80px;right:-80px;width:280px;height:280px;background:radial-gradient(circle,rgba(124,58,237,.2) 0%,transparent 70%)}
.ac-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:#fff;margin-bottom:12px}
.ac-title{font-family:'DM Sans',Arial,sans-serif;font-weight:700;font-size:1.4rem;color:#fff;margin-bottom:4px}
.ac-role{font-size:.7rem;color:rgba(255,255,255,.5);margin-bottom:20px;letter-spacing:.04em}
.ac-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.apt{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 14px}
.apt-t{font-size:.76rem;font-weight:600;color:#fff;margin-bottom:2px}
.apt-d{font-size:.68rem;color:rgba(255,255,255,.55);line-height:1.5}
.ac-cta{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:#7c3aed;border-radius:20px;font-size:.7rem;font-weight:600;color:#fff;border:none;cursor:pointer;margin-top:4px}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tag{padding:4px 10px;border-radius:20px;font-size:.6rem;letter-spacing:.04em;background:#ece7dd;color:#666;border:none}
.tag-o{background:rgba(124,58,237,.12);color:#7c3aed}
.tag-w{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:60px;scroll-margin-top:80px}
.card{background:#fff;border-radius:20px;padding:28px;border:1px solid rgba(0,0,0,.05)}
.skrow{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.skrow:last-child{border-bottom:none}
.skic{width:32px;height:32px;border-radius:8px;background:#f5f0e8;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.skic svg{width:18px;height:18px}
.sknm{font-size:.76rem;font-weight:600;color:#1a1a1a;margin-bottom:3px}
.ap{font-size:.84rem;color:#666;line-height:1.8;margin-bottom:8px}
.cd{display:flex;align-items:center;gap:8px;font-size:.74rem;color:#666;margin-bottom:6px}
.cdic{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#f5f0e8}
.cdic svg{width:14px;height:14px}
.hlr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f5f0e8;border-radius:10px;margin-bottom:5px}
.hld{width:6px;height:6px;border-radius:50%;background:#7c3aed;flex-shrink:0}
.hlt{font-size:.75rem;font-weight:600;color:#1a1a1a;margin-right:4px}
.hls{font-size:.7rem;color:#999}
.tli{display:grid;grid-template-columns:120px 1fr;gap:16px;padding:16px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.tli:last-child{border-bottom:none}
.tldt{font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:#7c3aed;padding-top:2px}
.tlco{font-family:'DM Sans',Arial,sans-serif;font-weight:700;font-size:.88rem;color:#1a1a1a;margin-bottom:2px}
.tlro{font-size:.68rem;color:#999;margin-bottom:5px}
.tldesc{font-size:.75rem;color:#666;line-height:1.65;margin-bottom:5px}
.svgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.svi{padding:20px;background:#f5f0e8;border-radius:14px;border:1px solid rgba(0,0,0,.05);transition:all .2s}
.svi:hover{background:#fff;border-color:rgba(124,58,237,.2);transform:translateY(-2px)}
.svic{margin-bottom:12px;display:flex;align-items:center;justify-content:center;width:36px;height:36px;background:rgba(124,58,237,.08);border-radius:10px}
.svic svg{width:20px;height:20px}
.svnm{font-family:'DM Sans',Arial,sans-serif;font-weight:700;font-size:.85rem;color:#1a1a1a;margin-bottom:4px}
.svds{font-size:.72rem;color:#666;line-height:1.6;margin-bottom:6px}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:10px}
.ci{padding:14px;background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:14px;transition:all .2s}
.ci:hover{border-color:#7c3aed;transform:translateY(-2px)}
.cdot{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:800;color:#fff;margin-bottom:8px}
.cnm{font-size:.76rem;font-weight:600;color:#1a1a1a;margin-bottom:2px}
.csb{font-size:.6rem;color:#999;line-height:1.4;margin-bottom:3px}
.cyr{font-size:.6rem;color:#7c3aed;font-weight:600}
.cyr.gold{color:#f59e0b}
.ct-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.ct-left{background:#fff;border-radius:20px;padding:32px;border:1px solid rgba(0,0,0,.05)}
.ct-right{background:linear-gradient(160deg,#2a2a3a 0%,#1a1a2e 60%,#0f0f1a 100%);border-radius:20px;padding:32px;display:flex;flex-direction:column;justify-content:space-between}
.ct-big{font-family:'DM Sans',Arial,sans-serif;font-weight:700;font-size:clamp(1.4rem,2.5vw,2rem);line-height:1.15;margin-bottom:14px}
.ct-rt-title{font-family:'DM Sans',Arial,sans-serif;font-weight:700;font-size:1.4rem;color:#fff;line-height:1.2;margin-bottom:20px}
.ct-rt-title span{color:#7c3aed}
.sbtns{display:flex;flex-wrap:wrap;gap:8px}
.sbtn{padding:9px 16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;font-size:.7rem;font-weight:500;color:#fff;cursor:pointer;transition:all .2s}
.sbtn:hover{background:rgba(124,58,237,.2);border-color:#7c3aed}
.lbdg{display:inline-block;padding:4px 10px;border-radius:6px;background:#f5f0e8;font-size:.62rem;color:#666;margin-right:5px;margin-top:5px}
.clients-band{background:#1a1a1a;border-radius:20px;padding:20px 32px;margin-bottom:60px;display:flex;align-items:center;overflow:hidden}
.cb-label{font-family:'DM Sans',Arial,sans-serif;font-weight:700;font-size:.9rem;color:#fff;white-space:nowrap;margin-right:28px;flex-shrink:0}
.cb-track-wrap{flex:1;overflow:hidden;mask-image:linear-gradient(to right,transparent,black 5%,black 95%,transparent)}
.cb-track{display:flex;gap:40px;align-items:center;width:max-content;animation:scroll-logos 22s linear infinite}
.cb-track:hover{animation-play-state:paused}
.cb-item{display:flex;align-items:center;opacity:.75;transition:opacity .2s;flex-shrink:0}
.cb-item:hover{opacity:1}
.cb-item svg{height:28px;width:auto;display:block}
@keyframes scroll-logos{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
footer{text-align:center;padding:24px;font-size:.6rem;color:#bbb;letter-spacing:.06em;border-top:1px solid rgba(0,0,0,.06)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:768px){
.hero-section,.two-col,.ct-grid{grid-template-columns:1fr}
.hero-right{display:none}
.stats-row{grid-template-columns:repeat(2,1fr)}
.ac-grid,.svgrid{grid-template-columns:1fr}
.tli{grid-template-columns:1fr}
.nav-links{display:none}
.page{padding:70px 18px 40px}
}
</style>
</head>
<body>
<nav>
  <div class="logo">P.<span>Damas</span></div>
  <div class="nav-c">
    <div class="nav-links" id="navLinks"></div>
    <div class="nav-sep"></div>
    <a href="blog.html" class="nav-ext" style="font-size:.65rem;letter-spacing:.03em;text-transform:uppercase;font-weight:600;color:#7c3aed;transition:color .2s;white-space:nowrap">Blog IT</a>

      <button id="bFR" class="on" onclick="setLang('fr')">FR</button>

      <div style="width:90px;height:90px;border-radius:50%;background:rgba(124,58,237,.2);border:2px solid rgba(124,58,237,.4);display:flex;align-items:center;justify-content:center;font-size:2.5rem;">👤</div>
      <div style="font-family:'DM Sans',sans-serif;font-weight:700;font-size:1.1rem;color:rgba(255,255,255,.7);letter-spacing:.05em">Philippe Damas</div>
      <div style="font-size:.7rem;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase">Senior IT Consultant</div>
    </div></div>
    </div>
  </section>
  <div class="sayhi">

  </div>
  <div class="stats-row" id="statsRow"></div>

    <div class="cb-label" id="cbLbl"></div>
    <div class="cb-track-wrap">

        <span class="cb-item" title="Société Générale"><svg viewBox="0 0 86 34" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="86" height="17" fill="#e2001a"/><rect x="0" y="17" width="86" height="17" fill="#111"/><text x="43" y="13.5" font-family="Arial,sans-serif" font-weight="800" font-size="10" fill="#fff" text-anchor="middle" letter-spacing="0.5">SOCIETE</text><text x="43" y="28.5" font-family="Arial,sans-serif" font-weight="800" font-size="10" fill="#fff" text-anchor="middle" letter-spacing="0.5">GENERALE</text></svg></span>
